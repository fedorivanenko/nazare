name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Must precede any build: building regenerates the revision, which would
      # hide a stale committed one.
      - name: fact cache revision matches compiler source
        run: pnpm -s check:fact-cache-revision
      - run: pnpm -s typecheck
      - run: pnpm dlx @biomejs/biome@2.4.14 check .
      - run: pnpm -s test:all
      - name: dist is not committed
        run: test -z "$(git ls-files '*/dist/*')"
