name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -s typecheck
      - run: pnpm dlx @biomejs/biome@2.4.14 check .
      - run: pnpm -s test:all
      - name: package ephemeral PR artifact
        if: github.event_name == 'pull_request'
        run: ./scripts/package-cli.sh "pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
      - name: upload ephemeral PR artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: nazare-cli-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: .release/nazare-cli-pr-${{ github.event.pull_request.number }}-${{ github.sha }}.tar.gz
          retention-days: 14
      - name: dist is not committed
        run: test -z "$(git ls-files '*/dist/*')"
