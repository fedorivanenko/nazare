name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -s typecheck
      - run: biome check .
      - run: pnpm -s test:all
      - run: ./scripts/package-cli.sh "${GITHUB_REF_NAME}"
      - uses: softprops/action-gh-release@v2
        with:
          files: .release/nazare-cli-${{ github.ref_name }}.tar.gz
